version: 2.1
jobs:
  build:
    docker:
      - image: dacunni/hobby:ubuntu_compilers
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    steps:
      - checkout
      - run:
          name: "Pull Submodules"
          command: |
            git submodule init
            git submodule update --remote
      - run:
          name: "Setup Build"
          command: mkdir build && cd build && cmake ..
      - run:
          name: "Build"
          command: cd build && make -j install
      - store_artifacts:
          path: build/app/trace_scene
      - persist_to_workspace:
          root: .
          paths:
            - . # Specify files/folders to save in the workspace
  unittest:
    docker:
      - image: dacunni/hobby:ubuntu_compilers
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    steps:
      - run: cat /etc/os-release
      - attach_workspace:
          at: /workspace
      - run: ls -l /workspace
      - run:
          name: "Test"
          command: cd /workspace/build && ctest --rerun-failed --output-on-failure
  coverage:
    docker:
      - image: dacunni/hobby:ubuntu_compilers
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    steps:
      - checkout
      - run:
          name: "Pull Submodules"
          command: |
            git submodule init
            git submodule update --remote
      - run:
          name: "Install lcov"
          command: apt-get install -y lcov
      - run:
          name: "Setup Coverage Build"
          command: mkdir build-cov && cd build-cov && cmake -DCMAKE_BUILD_TYPE=Coverage -DBUILD_PYTHON_BINDINGS=OFF ..
      - run:
          name: "Build"
          command: cd build-cov && make -j
      - run:
          name: "Run Tests"
          command: cd build-cov && ctest --output-on-failure
      - run:
          name: "Collect Coverage"
          command: |
            lcov --capture --directory build-cov --output-file coverage.info
            lcov --remove coverage.info '*/external/*' '*/unittests/*' '/usr/*' --output-file coverage.info
            lcov --list coverage.info
      - run:
          name: "Generate HTML Report"
          command: genhtml coverage.info --output-directory coverage-html
      - store_artifacts:
          path: coverage-html
  rendertest:
    docker:
      - image: dacunni/hobby:ubuntu_compilers
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    steps:
      - attach_workspace:
          at: /workspace
      - run: ls -l /workspace
      - run:
          name: "Render Test: Quick Look Scenes"
          command: |
            cd /workspace
            mkdir -p build/app/render_tests
            cd build/app
            export PATH=`pwd`:$PATH
            cd render_tests
            export MESH_PATH=/workspace/external/fluxrt-ci-data/3dmodels
            export ENV_MAP_PATH=/workspace/external/fluxrt-ci-data/envmaps
            export TEXTURE_PATH=/workspace/external/fluxrt-ci-data/textures
            find $MESH_PATH
            find $ENV_MAP_PATH
            find $TEXTURE_PATH
            trace_all -v -s /workspace/scenes/quicklook
      - store_artifacts:
          path: /workspace/build/app/render_tests
workflows:
  build-test:
    jobs:
      - build
      - unittest:
          requires:
            - build
      - coverage
      - rendertest:
          requires:
            - build

