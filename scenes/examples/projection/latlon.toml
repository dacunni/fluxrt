# Projection example: latlon (equirectangular 360 degree)
#
# Renders a full spherical capture from the camera position.
# Output width is always 2x height (2:1 aspect).
# Output: trace_color.png / trace_color.hdr
#
# Sensor pixelheight sets the output height; width = 2 * height.

[render]
projection = "latlon"

[camera]
type = "pinhole"
position = [ 0.0, 1.0, 0.0 ]
direction = [ 1.0, 0.0, 0.0 ]
up = [ 0.0, 1.0, 0.0 ]

[sensor]
pixelwidth = 400   # unused by latlon (width is always 2 * pixelheight)
pixelheight = 400  # output will be 800 x 400

[envmap]
type = "gradient"
low  = [ 0.05, 0.05, 0.1 ]
high = [ 0.4,  0.6,  1.0 ]
direction = [ 0.0, 1.0, 0.0 ]

# Floor
[[slabs]]
min = [ -100.0, -1.0, -100.0 ]
max = [  100.0, -0.5,  100.0 ]
[slabs.material]
type = "diffuse"
diffuse = [ 0.5, 0.5, 0.5 ]

# Red sphere ahead (+X)
[[spheres]]
radius = 0.8
position = [ 5.0, 0.5, 0.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.8, 0.1, 0.1 ]

# Green sphere to the right (+Z)
[[spheres]]
radius = 0.8
position = [ 0.0, 0.5, 5.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.1, 0.7, 0.1 ]

# Blue sphere behind (-X)
[[spheres]]
radius = 0.8
position = [ -5.0, 0.5, 0.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.1, 0.2, 0.9 ]

# Yellow sphere to the left (-Z)
[[spheres]]
radius = 0.8
position = [ 0.0, 0.5, -5.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.9, 0.8, 0.1 ]

# White mirror sphere in the center
[[spheres]]
radius = 0.6
position = [ 2.0, 0.1, 0.0 ]
[spheres.material]
type = "mirror"
