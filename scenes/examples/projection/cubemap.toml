# Projection example: cubemap (cross layout)
#
# Renders 6 faces (90-degree FOV each) into a single cross-layout image.
# Total output size: 4N x 3N where N = sensor pixelwidth.
#
#   Layout:       [+Y]
#            [-X] [+Z] [+X] [-Z]
#                 [-Y]
#
# Output: trace_color.png / trace_color.hdr

[render]
projection = "cubemap"

[camera]
type = "pinhole"
position = [ 0.0, 1.0, 0.0 ]
direction = [ 1.0, 0.0, 0.0 ]
up = [ 0.0, 1.0, 0.0 ]

[sensor]
pixelwidth  = 256  # N: face size. Output will be 1024 x 768 (4N x 3N)
pixelheight = 256  # unused by cubemap (faces are always square)

[envmap]
type = "gradient"
low  = [ 0.05, 0.05, 0.1 ]
high = [ 0.4,  0.6,  1.0 ]
direction = [ 0.0, 1.0, 0.0 ]

# Floor
[[slabs]]
min = [ -100.0, -1.0, -100.0 ]
max = [  100.0, -0.5,  100.0 ]
[slabs.material]
type = "diffuse"
diffuse = [ 0.5, 0.5, 0.5 ]

# Red sphere ahead (+X)
[[spheres]]
radius = 0.8
position = [ 5.0, 0.5, 0.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.8, 0.1, 0.1 ]

# Green sphere to the right (+Z)
[[spheres]]
radius = 0.8
position = [ 0.0, 0.5, 5.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.1, 0.7, 0.1 ]

# Blue sphere behind (-X)
[[spheres]]
radius = 0.8
position = [ -5.0, 0.5, 0.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.1, 0.2, 0.9 ]

# Yellow sphere to the left (-Z)
[[spheres]]
radius = 0.8
position = [ 0.0, 0.5, -5.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.9, 0.8, 0.1 ]

# White mirror sphere in the center
[[spheres]]
radius = 0.6
position = [ 2.0, 0.1, 0.0 ]
[spheres.material]
type = "mirror"
