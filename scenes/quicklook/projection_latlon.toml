# Quicklook: latlon projection (equirectangular 360)
# Output: 240 x 120 (2 * pixelheight x pixelheight)

[render]
projection = "latlon"

[camera]
type = "pinhole"
position = [ 0.0, 1.0, 0.0 ]
direction = [ 1.0, 0.0, 0.0 ]
up = [ 0.0, 1.0, 0.0 ]

[sensor]
pixelwidth = 160   # unused by latlon
pixelheight = 120  # output: 240 x 120

[envmap]
type = "gradient"
low  = [ 0.05, 0.05, 0.1 ]
high = [ 0.4,  0.6,  1.0 ]
direction = [ 0.0, 1.0, 0.0 ]

[[slabs]]
min = [ -100.0, -1.0, -100.0 ]
max = [  100.0, -0.5,  100.0 ]
[slabs.material]
type = "diffuse"
diffuse = [ 0.5, 0.5, 0.5 ]

[[spheres]]
radius = 0.8
position = [ 5.0, 0.5, 0.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.8, 0.1, 0.1 ]

[[spheres]]
radius = 0.8
position = [ 0.0, 0.5, 5.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.1, 0.7, 0.1 ]

[[spheres]]
radius = 0.8
position = [ -5.0, 0.5, 0.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.1, 0.2, 0.9 ]

[[spheres]]
radius = 0.8
position = [ 0.0, 0.5, -5.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.9, 0.8, 0.1 ]

[[spheres]]
radius = 0.6
position = [ 2.0, 0.1, 0.0 ]
[spheres.material]
type = "mirror"
