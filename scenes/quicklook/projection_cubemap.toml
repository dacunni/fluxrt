# Quicklook: cubemap projection (cross layout)
# Output: 640 x 480 (4N x 3N, N = pixelwidth = 160)

[render]
projection = "cubemap"

[camera]
type = "pinhole"
position = [ 0.0, 1.0, 0.0 ]
direction = [ 1.0, 0.0, 0.0 ]
up = [ 0.0, 1.0, 0.0 ]

[sensor]
pixelwidth  = 160  # N: face size. Output: 640 x 480
pixelheight = 160  # unused by cubemap (faces are always square)

[envmap]
type = "gradient"
low  = [ 0.05, 0.05, 0.1 ]
high = [ 0.4,  0.6,  1.0 ]
direction = [ 0.0, 1.0, 0.0 ]

[[slabs]]
min = [ -100.0, -1.0, -100.0 ]
max = [  100.0, -0.5,  100.0 ]
[slabs.material]
type = "diffuse"
diffuse = [ 0.5, 0.5, 0.5 ]

[[spheres]]
radius = 0.8
position = [ 5.0, 0.5, 0.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.8, 0.1, 0.1 ]

[[spheres]]
radius = 0.8
position = [ 0.0, 0.5, 5.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.1, 0.7, 0.1 ]

[[spheres]]
radius = 0.8
position = [ -5.0, 0.5, 0.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.1, 0.2, 0.9 ]

[[spheres]]
radius = 0.8
position = [ 0.0, 0.5, -5.0 ]
[spheres.material]
type = "diffuse"
diffuse = [ 0.9, 0.8, 0.1 ]

[[spheres]]
radius = 0.6
position = [ 2.0, 0.1, 0.0 ]
[spheres.material]
type = "mirror"
