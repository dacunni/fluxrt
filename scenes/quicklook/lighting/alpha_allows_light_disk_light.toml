[camera]
type = "pinhole"
hfov = 60

position = [ 0.0, 2.0, 3.0 ]
lookat = [ 0.0, 1.0, 0.0 ]
up = [ 0.0, 1.0, 0.0 ]

[sensor]
pixelwidth = 200
pixelheight = 200

[[disklights]]
position = [ 0.0, 3.0, 0.0 ]
direction = [ 0.0, 1.0, 0.0 ]
radius = 0.5
intensity = [ 10.0, 10.0, 10.0 ]

# Semi-transparent sphere: alpha < 1 lets disk light through to floor
[[spheres]]
radius = 0.8
position = [ 0.0, 1.2, 0.0 ]
    [spheres.material]
    type = "diffuse"
    diffuse = [ 1.0, 0.5, 0.5 ]
    alpha = 0.5

# Floor
[[slabs]]
min = [ -1000.0, -1000.0, -1000.0 ]
max = [ 1000.0, 0.0, 1000.0 ]
    [slabs.material]
    type = "diffuse"
    diffuse = [ 0.5, 0.5, 0.5 ]
