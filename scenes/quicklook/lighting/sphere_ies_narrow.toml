[camera]
type = "pinhole"
hfov = 30

position = [ 0.0, 0.0, 10.0 ]
direction = [ 0.0, 0.0, -1.0 ]
lookat = [ 0.2, 0.3, 0.5 ]
up = [ 0.0, 1.0, 0.0 ]

[sensor]
pixelwidth = 200
pixelheight = 200

# Narrow downlight directly above the sphere, aimed straight down
[[ieslights]]
file = "scenes/ies_profiles/downlight_narrow.ies"
position = [ 0.0, 4.0, 0.0 ]
direction = [ 0.0, -1.0, 0.0 ]
color = [ 0.001, 0.001, 0.001 ]

[[spheres]]
radius = 1.0
    [spheres.material]
    type = "diffuse"
    diffuse = [ 1.0, 1.0, 1.0 ]

[[slabs]]
min = [ -1000.0, -1000.0, -1000.0 ]
max = [ 1000.0, -1.0, 1000.0 ]
    [slabs.material]
    type = "diffuse"
    diffuse = [ 0.5, 0.5, 0.5 ]
